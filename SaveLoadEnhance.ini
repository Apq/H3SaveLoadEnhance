; SaveLoadEnhance.ini
; 人性化读档插件配置
; 放在 SaveLoadEnhance.dll 同目录下

[Logging]
; 是否禁止记录日志。
; 0 = 不禁止，正常生成日志并保留最近 30 个（默认）
; 1 = 禁止，不生成日志，也不扫描/清理旧日志
DisableLog=0

; 系统支持：
; - 推荐：Windows 10 / Windows 11
; - 理论兼容：Windows 7 SP1 / Windows 8.1 及以上
; - 支持 32 位 Windows，也支持 64 位 Windows 上的 32 位 Heroes3/HD Mod 进程
; - 需要 Heroes3 HD Mod / SoD_SP 插件环境
; - 如系统缺少运行库，需要安装 Visual C++ Redistributable
;
; 不支持：
; - Windows XP / Windows Server 2003
; - 非 Windows 系统
; - 64 位游戏进程
;
; 说明：
; - 当前 DLL 使用 MSVC 构建，PE 子系统版本为 6.00，因此不面向 Windows XP。
; - 插件本身只使用基础 Win32 API，没有 Windows 10/11 专属 API。
